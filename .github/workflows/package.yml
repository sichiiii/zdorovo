name: Debian package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential debhelper dh-python python3-all \
            python3-gi python3-gi-cairo python3-cairo gir1.2-gtk-4.0 gir1.2-adw-1 \
            gir1.2-atspi-2.0 gir1.2-graphene-1.0 at-spi2-core
      - name: Build
        run: |
          dpkg-buildpackage --build=binary --no-sign
          mkdir -p dist
          cp ../zdorovo_*.deb dist/
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: zdorovo-deb
          path: dist/*.deb
      - name: Attach package to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: false
