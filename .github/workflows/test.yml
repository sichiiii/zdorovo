name: Test

on:
  push:
  pull_request:

jobs:
  python:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
          - name: Debian 13
            image: debian:13
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime and test tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3 python3-gi python3-gi-cairo python3-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1 gir1.2-atspi-2.0 \
            gir1.2-graphene-1.0 at-spi2-core
      - name: Unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Syntax checks
        run: |
          python3 -m py_compile healthbreak.py indicator.py localization.py
          bash -n install.sh launch.sh uninstall.sh scripts/build-deb.sh
