name: Bug report
description: Сообщить о воспроизводимой проблеме
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Что произошло
      description: Опишите фактическое и ожидаемое поведение.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести
      placeholder: |
        1. Открыть…
        2. Нажать…
        3. Увидеть…
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Система
      placeholder: Ubuntu 24.04, GNOME 46, Wayland
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия Zdorovo
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Логи
      description: Удалите личные данные перед публикацией.
      render: shell

